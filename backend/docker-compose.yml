version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: yatrasathi-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: yatrasathi
      POSTGRES_USER: yatrasathi
      POSTGRES_PASSWORD: yatrasathipass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - yatrasathi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yatrasathi -d yatrasathi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yatrasathi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - yatrasathi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:

networks:
  yatrasathi-network:
    driver: bridge
