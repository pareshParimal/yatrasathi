<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YatraSathi - Your Travel Companion</title>
    <!-- Use Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
    <div id="app-container">
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="compass"></i>
                <span>YatraSathi</span>
            </div>
            <ul class="nav-links">
                <li><a href="#home" class="active" id="nav-home"><i data-lucide="home"></i> <span data-i18n="nav_dashboard">Dashboard</span></a></li>
                <li><a href="#planner" id="nav-planner"><i data-lucide="map"></i> <span data-i18n="nav_planner">Plan Trip</span></a></li>
                <li><a href="#places" id="nav-places"><i data-lucide="image"></i> <span data-i18n="nav_places">Discover</span></a></li>
                <li><a href="#chat" id="nav-chat"><i data-lucide="message-circle"></i> <span data-i18n="nav_chat">AI Assistant</span></a></li>
                <li style="margin-top: 1rem;"><a href="#" id="nav-logout" style="color: #ef4444;"><i data-lucide="log-out"></i> <span data-i18n="nav_logout">Logout</span></a></li>
            </ul>
            <div class="nav-bottom" style="display:flex; flex-direction:column; gap:10px;">
                <select id="lang-switcher" style="padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; outline: none; cursor: pointer; font-family: 'Outfit';">
                    <option value="hi">हिंदी (Hindi)</option>
                    <option value="en">English</option>
                </select>
<!--                <button class="emergency-btn" id="btn-emergency">-->
<!--                    <i data-lucide="alert-circle"></i> Share Location-->
<!--                </button>-->
            </div>
        </nav>

        <main class="main-content">
            <!-- Dynamic Content Area -->
            <div id="content-root"></div>
        </main>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/api.js?v=7"></script>
    <script type="module" src="js/app.js?v=7"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
